<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>Page {{ page_index|add:1 }} of {{ total_pages }}</h2>
<!-- The subject is inferred from the first question since they are grouped -->
<h3>Subject: {{ questions.0.get_subject_display }}</h3>

<form method="POST">
    {% csrf_token %}

    {% for q in questions %}
        <div class="question-block">
            <p>{{ forloop.counter }}. {{ q.text }}</p>

            {% if q.image %}
                <img src="{{ q.image.url }}" alt="Question Diagram" style="max-width: 400px;">
            {% endif %}

            <!-- We use dictionary lookup in django template using a custom filter, or simple checked logic -->
            <label><input type="radio" name="question_{{ q.id }}" value="1"> {{ q.option_1 }}</label><br>
            <label><input type="radio" name="question_{{ q.id }}" value="2"> {{ q.option_2 }}</label><br>
            <label><input type="radio" name="question_{{ q.id }}" value="3"> {{ q.option_3 }}</label><br>
            <label><input type="radio" name="question_{{ q.id }}" value="4"> {{ q.option_4 }}</label><br>
        </div>
        <hr>
    {% endfor %}

    {% if page_index < total_pages|add:"-1" %}
        <button type="submit">Save & Next</button>
    {% else %}
        <button type="submit" onclick="return confirm('Are you sure you want to submit the whole quiz?');">Submit Final Quiz</button>
    {% endif %}
</form>
</body>
</html>
