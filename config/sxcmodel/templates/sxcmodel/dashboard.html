<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>Leaderboard</h2>
<ol>
    {% for entry in leaderboard %}
        <li>{{ entry.user.username }} - Score: {{ entry.score }} (Grade: {{ entry.final_grade }})</li>
    {% endfor %}
</ol>

<h2>Take Quiz</h2>
<form action="{% url 'sxcmodel:start_quiz' %}" method="POST">
    {% csrf_token %}
    {% if active_attempt %}
        <p>You have an unfinished quiz!</p>
        <button type="submit" name="action" value="resume">Resume Previous Quiz</button>
        <button type="submit" name="action" value="new" onclick="return confirm('This will delete previous progress. Are you sure?');">Start New Quiz</button>
    {% else %}
        <button type="submit" name="action" value="new">Start Quiz</button>
    {% endif %}
</form>
</body>
</html>
