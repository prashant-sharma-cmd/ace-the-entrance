<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}QuizForge{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #141720;
      --surface2: #1c2030;
      --surface3: #242840;
      --border: #2a2f45;
      --border2: #353b55;
      --text: #e8eaf0;
      --text-muted: #7c84a0;
      --text-dim: #4a5270;
      --accent: #f0a500;
      --accent2: #e8870a;
      --accent-glow: rgba(240, 165, 0, 0.12);
      --green: #22c98a;
      --green-bg: rgba(34, 201, 138, 0.1);
      --red: #f05555;
      --red-bg: rgba(240, 85, 85, 0.1);
      --blue: #5599ff;
      --blue-bg: rgba(85, 153, 255, 0.1);
      --purple: #a855f7;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius: 10px;
      --radius-lg: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      font-size: 15px;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    /* ── Nav ── */
    nav {
      background: rgba(13, 15, 20, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 2rem;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-links { display: flex; align-items: center; gap: 0.5rem; }
    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: var(--transition);
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--accent); }

    /* ── Main Layout ── */
    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow);
    }
    .card-sm { padding: 1.25rem 1.5rem; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: var(--transition);
      text-decoration: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #0d0f14;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(240,165,0,0.25); }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { background: #d94444; }
    .btn-success { background: var(--green); color: #0d0f14; }
    .btn-ghost { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); background: var(--surface3); }
    .btn-lg { padding: 0.85rem 2rem; font-size: 1rem; border-radius: 12px; }
    .btn-sm { padding: 0.4rem 0.85rem; font-size: 0.8rem; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
    }
    .badge-phy { background: rgba(85,153,255,0.15); color: #7eb5ff; }
    .badge-che { background: rgba(168,85,247,0.15); color: #c084fc; }
    .badge-bio { background: rgba(34,201,138,0.15); color: #4ade80; }
    .badge-mat { background: rgba(240,165,0,0.15); color: var(--accent); }
    .badge-eng { background: rgba(251,113,133,0.15); color: #fb7185; }
    .badge-iq { background: rgba(251,191,36,0.15); color: #fbbf24; }

    /* ── Forms ── */
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.7rem 1rem;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-input::placeholder { color: var(--text-dim); }

    /* ── Alert ── */
    .alert {
      padding: 0.85rem 1.25rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .alert-error { background: var(--red-bg); border: 1px solid rgba(240,85,85,0.3); color: #ff8585; }
    .alert-success { background: var(--green-bg); border: 1px solid rgba(34,201,138,0.3); color: var(--green); }
    .alert-info { background: var(--blue-bg); border: 1px solid rgba(85,153,255,0.3); color: var(--blue); }

    /* ── Typography ── */
    h1, h2, h3 { font-family: var(--font-display); letter-spacing: -0.02em; line-height: 1.2; }
    h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; }
    h2 { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 700; }
    h3 { font-size: 1.2rem; font-weight: 600; }

    /* ── Divider ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    /* ── Utilities ── */
    .text-accent { color: var(--accent); }
    .text-muted { color: var(--text-muted); }
    .text-green { color: var(--green); }
    .text-red { color: var(--red); }
    .text-center { text-align: center; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mt-4 { margin-top: 2rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-1 { gap: 0.5rem; }
    .gap-2 { gap: 1rem; }
    .gap-3 { gap: 1.5rem; }
    .w-full { width: 100%; }

    /* ── Page fade-in ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease both; }
    .fade-up-delay { animation: fadeUp 0.4s 0.1s ease both; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="{% url 'quiz_home' %}" class="nav-brand">⬡ QuizForge</a>
      <div class="nav-links">
        {% if user.is_authenticated %}
          <a href="{% url 'quiz_home' %}" class="nav-link">Home</a>
          <a href="{% url 'leaderboard' %}" class="nav-link">Leaderboard</a>
          <span class="nav-link" style="color: var(--text-dim);">{{ user.username }}</span>
          <a href="{% url 'logout' %}" class="nav-link">Sign out</a>
        {% else %}
          <a href="{% url 'login' %}" class="nav-link">Sign in</a>
          <a href="{% url 'register' %}" class="nav-link">Register</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block extra_js %}{% endblock %}
</body>
</html>
